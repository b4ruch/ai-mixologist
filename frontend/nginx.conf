server {
    # Cloud Run injects the PORT env variable natively but mostly targets 8080 conceptually.
    # Nginx in this container is expected to listen on 8080 since we define it.
    listen 8080;
    
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Single Page App routing fallback: sends all unmatched routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets aggressively
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|otf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
